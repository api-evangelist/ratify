aid: ratify
name: Ratify
description: >-
  Ratify is an open-source framework for verifying reference artifacts and
  enforcing policies in Kubernetes and other cloud-native environments,
  supporting supply chain security through signature and attestation
  verification. Ratify is consumed via Kubernetes admission webhooks, a CLI,
  and Go libraries; no public REST API or OpenAPI specification is published
  upstream.
